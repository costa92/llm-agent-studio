services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: studio
      POSTGRES_DB: studio
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studio"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - studio_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: studio
      MINIO_ROOT_PASSWORD: studio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - studio_minio:/data

  # One-shot bucket provisioning: blob/s3 does NOT auto-create buckets.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - mc alias set local http://minio:9000 studio studio-secret && mc mb --ignore-existing local/studio-assets

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  studiod:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    environment:
      HTTP_ADDR: ":8083"
      PG_URL: "postgres://postgres:studio@postgres:5432/studio?sslmode=disable"
      JWT_SECRET: "dev-insecure-secret-change-me"
      # LLM provider for planner/script/storyboard/review (pass keys from host env).
      PROVIDER: "${PROVIDER:-deepseek}"
      MODEL: "${MODEL:-deepseek-chat}"
      API_KEY: "${API_KEY:-}"
      # Per-provider image keys (M3 模型路由; empty = provider not registered).
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:-}"
      VOLCENGINE_API_KEY: "${VOLCENGINE_API_KEY:-}"
      BLOB_MODE: "s3"
      S3_ENDPOINT: "minio:9000"
      S3_BUCKET: "studio-assets"
      S3_ACCESS_KEY: "studio"
      S3_SECRET_KEY: "studio-secret"
      S3_USE_SSL: "false"
      # ── Cloud object-store alternatives ──────────────────────────────────
      # To use a managed bucket instead of the local minio, set BLOB_MODE to
      # "oss" or "cos" (replacing the BLOB_MODE/S3_* lines above) and pass
      # credentials from host env — NEVER hardcode keys here. These hit real
      # Alibaba/Tencent endpoints, so the minio/minio-init services are unused
      # and the bucket must be pre-provisioned in the cloud console.
      #
      # Alibaba Cloud OSS (official SDK; OSS signature ≠ AWS SigV4):
      #   BLOB_MODE: "oss"
      #   OSS_ENDPOINT: "${OSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}"
      #   OSS_BUCKET: "${OSS_BUCKET:-}"
      #   OSS_ACCESS_KEY_ID: "${OSS_ACCESS_KEY_ID:-}"
      #   OSS_ACCESS_KEY_SECRET: "${OSS_ACCESS_KEY_SECRET:-}"
      #
      # Tencent Cloud COS (S3-compatible; reuses the s3/minio-go adapter, TLS forced):
      #   BLOB_MODE: "cos"
      #   COS_REGION: "${COS_REGION:-ap-guangzhou}"   # endpoint derived: cos.<region>.myqcloud.com
      #   COS_BUCKET: "${COS_BUCKET:-}"               # bucket name is name-appid
      #   COS_SECRET_ID: "${COS_SECRET_ID:-}"
      #   COS_SECRET_KEY: "${COS_SECRET_KEY:-}"
      #   # COS_ENDPOINT: "${COS_ENDPOINT:-}"         # optional explicit host override (private/finance cloud)
      OTLP_ENDPOINT: "otel-collector:4318"
      OTLP_PROTOCOL: "http"
      OTLP_INSECURE: "true"
      ORG_DAILY_GEN_QUOTA: "${ORG_DAILY_GEN_QUOTA:-200}"
      MAX_CONCURRENT_GENERATIONS: "${MAX_CONCURRENT_GENERATIONS:-4}"
    ports:
      - "8083:8083"

volumes:
  studio_pgdata:
  studio_minio:
