<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // 防闪烁：paint 前据 localStorage / prefers-color-scheme 预设 html[data-theme]。
      // 逻辑须与 src/app/theme.tsx 的 readStored/systemDefault 逐分支一致（含 localStorage
      // 与 matchMedia 各自独立 try/catch 的降级路径），否则首屏与 React 初值不一致会闪烁。
      // 白名单须与 theme.tsx THEMES 一致。
      (function () {
        function systemTheme() {
          try {
            return window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark-studio"
          } catch (e) {
            return "dark-studio"
          }
        }
        var t
        try {
          var v = localStorage.getItem("studio-theme")
          if (["dark-studio", "light", "cinematic"].indexOf(v) !== -1) t = v
        } catch (e) {
          /* localStorage 不可用：落到系统默认 */
        }
        document.documentElement.setAttribute("data-theme", t || systemTheme())
      })()
    </script>
    <title>AI Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
